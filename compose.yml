services:
  postgres:
    image: postgres:16
    container_name: pdsi1-postgres
    environment:
      POSTGRES_DB: mednotify
      POSTGRES_USER: mednotify
      POSTGRES_PASSWORD: mednotify
    ports:
      - "5432:5432"
    volumes:
      - pdsi1_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mednotify -d mednotify"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pdsi1_postgres:
